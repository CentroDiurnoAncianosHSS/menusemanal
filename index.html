<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Pro Moderno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 4px solid #8b5cf6;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            touch-action: none;
        }
        .ui-overlay {
            position: absolute;
            z-index: 10;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <div id="ui" class="ui-overlay">
        <h1 class="text-5xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Ping Pong Pro</h1>
        <p class="mb-6 text-slate-300">Usa las <b>flechas ↑ ↓</b> para moverte</p>
        <button id="startBtn" class="px-8 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-full transition-all transform hover:scale-105 shadow-lg">
            ¡COMENZAR JUEGO!
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");
        const ui = document.getElementById("ui");

        canvas.width = 800;
        canvas.height = 500;

        let gameRunning = false;
        let scorePlayer = 0;
        let scoreAI = 0;

        const ball = { x: 400, y: 250, radius: 10, speedX: 7, speedY: 7, color: "#22d3ee" };
        const player = { x: 20, y: 200, width: 12, height: 100, color: "#a855f7", dy: 0 };
        const ai = { x: 768, y: 200, width: 12, height: 100, color: "#f43f5e", dy: 0 };

        // Controles de teclado
        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        function update() {
            if (!gameRunning) return;

            // Movimiento jugador
            if (keys["ArrowUp"] && player.y > 0) player.y -= 8;
            if (keys["ArrowDown"] && player.y < canvas.height - player.height) player.y += 8;

            // Mover pelota
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Colisión paredes Y
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.speedY *= -1;
            }

            // AI (con margen de error)
            let aiCenter = ai.y + ai.height / 2;
            if (aiCenter < ball.y - 30) ai.y += 5.5;
            else if (aiCenter > ball.y + 30) ai.y -= 5.5;

            // Colisión paletas
            let paddle = (ball.x < canvas.width / 2) ? player : ai;
            if (collision(ball, paddle)) {
                ball.speedX *= -1.05;
                ball.speedY *= 1.05;
            }

            // Puntuación
            if (ball.x - ball.radius < 0) { scoreAI++; resetBall(); }
            else if (ball.x + ball.radius > canvas.width) { scorePlayer++; resetBall(); }
        }

        function collision(b, p) {
            return b.x < p.x + p.width && b.x + b.radius > p.x &&
                   b.y < p.y + p.height && b.y + b.radius > p.y;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = 7 * (ball.speedX > 0 ? -1 : 1);
            ball.speedY = 7;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar red central
            ctx.strokeStyle = "#334155";
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Dibujar objetos
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = ai.color;
            ctx.fillRect(ai.x, ai.y, ai.width, ai.height);
            
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 40px Inter";
            ctx.fillText(scorePlayer, canvas.width / 4, 60);
            ctx.fillText(scoreAI, 3 * canvas.width / 4, 60);
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener("click", () => {
            gameRunning = true;
            ui.style.display = "none";
        });

        gameLoop();
    </script>
</body>
</html>
